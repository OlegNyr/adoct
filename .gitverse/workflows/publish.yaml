name: publish-plugin

# Релиз = bump pluginVersion -> тег vX.Y.Z -> push. Дальше всё делает CI:
#   1) собирает плагин (-Drelease=true, чтобы версия в манифесте была без -SNAPSHOT);
#   2) публикует .zip в GitVerse Releases (для скачивания людьми);
#   3) кладёт .zip + updatePlugins.xml на GitVerse Pages (на них смотрит IDE — публичная статика, без токена).
#
# Имена actions и паттерн Pages-деплоя сверены с официальными примерами GitVerse:
#   - actions/checkout@v4, actions/setup-java@v4 (temurin 21) — поддерживаются;
#   - публикация Pages: actions/upload-pages-artifact@v1 (артефакт по умолчанию "gitverse-pages")
#     + actions/deploy-pages@v1, которому для работы нужен Go (actions/setup-go@v4);
#   - блоки permissions/environment не нужны (в примере GitVerse их нет).
# Контекст github.* доступен для обратной совместимости, поэтому $GITHUB_* в run-шагах рабочие.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}        # ручной перезапуск / откат на нужный тег

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve plugin metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PROP_VERSION="$(grep -E '^pluginVersion' gradle.properties | head -n1 | cut -d= -f2 | xargs)"
          # На пуш тега версия тега обязана совпадать с pluginVersion (иначе updatePlugins.xml разойдётся с манифестом).
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$VERSION" != "$PROP_VERSION" ]; then
            echo "::error::Тег $GITHUB_REF_NAME (=$VERSION) не совпадает с pluginVersion=$PROP_VERSION в gradle.properties"
            exit 1
          fi
          [ -z "$VERSION" ] && VERSION="$PROP_VERSION"   # для ручного workflow_dispatch без тега
          {
            echo "VERSION=$VERSION"
            echo "PLUGIN_ID=$(grep -oP '(?<=<id>).*?(?=</id>)' src/main/resources/META-INF/plugin.xml)"
            echo "SINCE_BUILD=$(grep -E '^pluginSinceBuild' gradle.properties | cut -d= -f2 | xargs)"
            echo "UNTIL_BUILD=$(grep -E '^pluginUntilBuild' gradle.properties | cut -d= -f2 | xargs)"
            echo "PAGES_BASE=https://olegnyr.gitverse.site/adoct"
          } >> "$GITHUB_ENV"

      - name: Build plugin
        # sh gradlew (а не ./gradlew) — не зависит от флага исполняемости при checkout.
        # --info: видно загрузку дистрибутива IDE (~1.3 ГБ) на «Calculating task graph».
        run: sh gradlew buildPlugin -Drelease=true --no-daemon --info --stacktrace

      - name: Locate distribution
        run: |
          ZIP="$(ls build/distributions/*.zip | head -n1)"
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"
          echo "ZIP_NAME=$(basename "$ZIP")" >> "$GITHUB_ENV"

      # Releases — для скачивания людьми. Старые ассеты не удаляем (источник для отката).
      # Используем встроенный репозиторный токен CI (github.token), а не аккаунтовый PAT.
      - name: Create release & upload zip
        if: github.event_name == 'push'
        # Не критично: Releases — для людей, а IDE берёт zip с Pages. Если шаг упадёт
        # (например, токену не хватит прав на релиз) — пайплайн всё равно публикует Pages.
        continue-on-error: true
        uses: actions/create-release@v1
        with:
          api_key: ${{ github.token }}
          title: AsciiDocTools ${{ env.VERSION }}
          body: |
            Автоматическая сборка по тегу ${{ github.ref_name }}.

            Установка в IDE: Settings -> Plugins -> (шестерёнка) -> Manage Plugin Repositories -> +
            ${{ env.PAGES_BASE }}/updatePlugins.xml
          files: |
            ${{ env.ZIP_PATH }}
          draft: false
          pre_release: false

      # Pages-пэйлоад: index.html (обязателен для артефакта Pages) + .nojekyll + updatePlugins.xml + сам .zip.
      # updatePlugins.xml указывает на ${PAGES_BASE}/${ZIP_NAME} — публичный статический URL на Pages.
      - name: Assemble Pages payload
        run: |
          rm -rf public && mkdir -p public
          cp pages/index.html pages/.nojekyll public/
          cp "$ZIP_PATH" "public/$ZIP_NAME"
          export ASSET_URL="${PAGES_BASE}/${ZIP_NAME}"
          bash scripts/gen-update-plugins.sh        # пишет ./updatePlugins.xml
          mv updatePlugins.xml public/
          echo "Содержимое public/:" && ls -la public

      # Артефакт по умолчанию называется "gitverse-pages" (его и берёт deploy-pages ниже).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: public

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      # Go необходим для работы actions/deploy-pages на GitVerse.
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.23'

      - name: Deploy to GitVerse Pages
        id: deployment
        uses: actions/deploy-pages@v1
        with:
          artifact_name: gitverse-pages

      - name: Print page URL
        run: echo "page_url = ${{ steps.deployment.outputs.page_url }}"
